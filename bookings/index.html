<!DOCTYPE html>
<html lang="en">
<head>

    <title>Check-in and Bookings - Orpheus Airways</title>
</head>
<body>
    <script src="script.js"></script>
    <div id="header">
        <img id="logo" src="../img/logo.png">

            <a href=".."><button>← Back</button></a>
        </div>
    </div>
    <div id="footer">
        <div>Copyright © 2026 Orpheus Airways</div>
        <div id="footer-logo">
            <img src="../img/logo.png">
            <h1>Orpheus Airways</h1>
        </div>

</html>
